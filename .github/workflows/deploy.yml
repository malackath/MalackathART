name: Deploy to Cloud Run

on:
  push:
    branches: [main, master]

env:
  PROJECT_ID: malackath-art
  SERVICE_NAME: malackath-art
  REGION: us-central1
  IMAGE: gcr.io/malackath-art/malackath-art

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          CI: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag ${{ env.IMAGE }} \
            --project ${{ env.PROJECT_ID }} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "MONGO_URL=${{ secrets.MONGO_URL }}" \
            --set-env-vars "DB_NAME=malackath_art" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "ADMIN_EMAIL=admin@malackath.art" \
            --set-env-vars "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" \
            --set-env-vars "STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}" \
            --set-env-vars "HUBSPOT_TOKEN=${{ secrets.HUBSPOT_TOKEN }}" \
            --project ${{ env.PROJECT_ID }}

      - name: Done
        run: echo "✅ Deployed to https://arnelli.com"
